name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      NEXT_PUBLIC_API_URL: https://api.prontiq.dev
    permissions:
      id-token: write
      contents: read
    # Mirror of deploy-dev: expose the deployed API URL as a job
    # output so smoke-prod targets exactly what was deployed (today
    # `https://api.prontiq.dev`; if that custom domain ever changes,
    # smoke follows automatically).
    outputs:
      api_url: ${{ steps.api-url.outputs.api_url }}
    # Serialize prod deploys at the GHA layer so multiple manual
    # dispatches queue rather than race. cancel-in-progress: false
    # because losing a half-applied prod deploy is worse than queueing.
    concurrency:
      group: sst-deploy-prod
      cancel-in-progress: false
    steps:
      - name: Require main branch for prod deploy
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Deploy to Production must be dispatched from refs/heads/main. Current ref: ${GITHUB_REF}"
            echo "::error::Re-run this workflow from the main branch after merge."
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Validate required prod deploy config
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          LAGO_API_KEY: ${{ secrets.LAGO_API_KEY }}
          LAGO_API_URL: ${{ vars.LAGO_API_URL }}
          LAGO_PAYMENT_PROVIDER_CODE: ${{ vars.LAGO_PAYMENT_PROVIDER_CODE }}
          LAGO_WEBHOOK_HMAC_SECRET: ${{ secrets.LAGO_WEBHOOK_HMAC_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          required=(CLERK_WEBHOOK_SECRET CLERK_SECRET_KEY HONEYCOMB_API_KEY LAGO_API_KEY LAGO_API_URL LAGO_PAYMENT_PROVIDER_CODE LAGO_WEBHOOK_HMAC_SECRET)
          for name in "${required[@]}"; do
            value="${!name:-}"
            trimmed="${value#"${value%%[![:space:]]*}"}"
            trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
            if [[ -z "$trimmed" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing or whitespace-only GitHub Environment deploy config for stage prod: ${missing[*]}"
            echo "::error::Set secrets/vars at Settings → Environments → prod, then re-run the deploy workflow."
            exit 1
          fi

      - run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # NO automatic unlock for prod. Higher stakes than dev — if a
      # prod lock is held when this dispatch runs, FAIL FAST with
      # clear recovery instructions. Operator must verify no active
      # deploy exists and run the manual `recover-lock.yml` workflow
      # to clear the lock before retrying.
      #
      # Rationale: an unconditional unlock could yank a live lock from
      # an operator's local `sst deploy --stage prod` (rare, but
      # possible). For prod the "safe but slow" cost of explicit
      # operator action is preferable to the "fast but corrupting" cost
      # of auto-recovery getting it wrong.
      - name: Fail fast if prod lock is held
        env:
          STATE_BUCKET: sst-state-vbnmvbvmbzkk
          LOCK_KEY: lock/prontiq/prod.json
        run: |
          set -euo pipefail
          if aws s3api head-object \
            --bucket "$STATE_BUCKET" \
            --key "$LOCK_KEY" \
            --region ap-southeast-2 >/dev/null 2>&1
          then
            LOCK_JSON=$(aws s3 cp "s3://$STATE_BUCKET/$LOCK_KEY" - --region ap-southeast-2)
            echo "::error::Prod SST lock is held. Lock metadata: $LOCK_JSON"
            echo "::error::To recover: confirm no active prod deploy is running, then run the 'Recover stale SST lock' workflow with stage=prod."
            exit 1
          fi
          echo "No prod lock held — safe to deploy."

      - name: Workaround SST/Pulumi version conflict (sst#6314)
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      - name: Deploy to prod
        shell: bash
        env:
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_SKIP_CREDENTIALS_VALIDATION: "true"
          BILLING_EVENTS_ENABLED: ${{ vars.BILLING_EVENTS_ENABLED }}
          COUNTER_PERIOD_SOURCE: ${{ vars.COUNTER_PERIOD_SOURCE }}
          HONEYCOMB_ENABLED: ${{ vars.HONEYCOMB_ENABLED }}
          CLERK_ADMIN_ROLES: ${{ vars.CLERK_ADMIN_ROLES }}
          CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
          CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          LAGO_API_KEY: ${{ secrets.LAGO_API_KEY }}
          LAGO_API_URL: ${{ vars.LAGO_API_URL }}
          LAGO_PAYMENT_PROVIDER_CODE: ${{ vars.LAGO_PAYMENT_PROVIDER_CODE }}
          LAGO_WEBHOOK_HMAC_SECRET: ${{ secrets.LAGO_WEBHOOK_HMAC_SECRET }}
          LAGO_WEBHOOK_RECONCILIATION_ENABLED: ${{ vars.LAGO_WEBHOOK_RECONCILIATION_ENABLED }}
          PRONTIQ_ACCOUNT_URL: ${{ vars.PRONTIQ_ACCOUNT_URL }}
          ALERT_EMAILS: ${{ vars.ALERT_EMAILS }}
          PRONTIQ_BILLING_URL: ${{ vars.PRONTIQ_BILLING_URL }}
          PRONTIQ_DOCS_URL: ${{ vars.PRONTIQ_DOCS_URL }}
          WELCOME_EMAIL_FROM: ${{ vars.WELCOME_EMAIL_FROM }}
        run: |
          set -x
          timeout --signal=SIGTERM --kill-after=30s 10m pnpm deploy:prod || EXIT=$?
          echo "deploy exited with code: ${EXIT:-0}"
          exit "${EXIT:-0}"

      - name: Extract deployed API URL
        id: api-url
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .sst/outputs.json ]]; then
            echo "::error::.sst/outputs.json missing after deploy — cannot pass api URL to smoke."
            exit 1
          fi
          API_URL=$(jq -r '.api // empty' .sst/outputs.json)
          if [[ -z "$API_URL" ]]; then
            echo "::error::SST output 'api' is missing or empty in .sst/outputs.json."
            cat .sst/outputs.json
            exit 1
          fi
          API_URL="${API_URL%/}"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved deployed API URL: $API_URL"

  # Post-deploy smoke against the live prod API. Mirrors smoke-dev in
  # ci.yml. PRONTIQ_API is the URL the deploy step exposed via job
  # output (today `https://api.prontiq.dev`). CLERK_TEST_USER_ID
  # resolves to the prod tenant's labelled test user via the prod
  # GitHub Environment (P1B.21 fixture — never a real customer).
  #
  # The smoke scripts already accept PRONTIQ_API via env; we drop the
  # `:prod`-suffixed variants here in favour of the env-driven path
  # so the resolution mechanism matches dev exactly. The `:prod` npm
  # scripts remain available for operator-run local smoke.
  smoke-prod:
    needs: deploy
    runs-on: ubuntu-latest
    environment: prod
    env:
      PRONTIQ_API: ${{ needs.deploy.outputs.api_url }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_TEST_USER_ID: ${{ vars.CLERK_TEST_USER_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Validate resolved API URL
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PRONTIQ_API:-}" ]]; then
            echo "::error::PRONTIQ_API was not propagated from deploy. Check the deploy job outputs.api_url step."
            exit 1
          fi
          # Sanity: prod must use the prod custom domain (or fail loud
          # if the SST output ever changes).
          if [[ "$PRONTIQ_API" != "https://api.prontiq.dev" ]]; then
            echo "::warning::Resolved prod PRONTIQ_API=$PRONTIQ_API is not the expected custom domain. Continuing — but verify this is intentional (e.g. domain rotation in sst.config.ts)."
          fi
          echo "Smoking against: $PRONTIQ_API"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Smoke — account setup
        run: pnpm --filter @prontiq/api smoke:account-setup
      - name: Smoke — keys list/create
        run: pnpm --filter @prontiq/api smoke:keys
      - name: Smoke — keys step-up gate
        run: pnpm --filter @prontiq/api smoke:keys-stepup
