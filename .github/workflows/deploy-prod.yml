name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # See ci.yml for the rationale behind `script -qefc` — forces a pty so
      # Node/Pulumi line-buffers progress output instead of block-buffering
      # it silently.
      - name: Deploy to prod (line-buffered for live progress)
        run: script -qefc "pnpm deploy:prod" /dev/null
