name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    # Serialize prod deploys at the GHA layer so multiple manual
    # dispatches queue rather than race. cancel-in-progress: false
    # because losing a half-applied prod deploy is worse than queueing.
    concurrency:
      group: sst-deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # NO automatic unlock for prod. Higher stakes than dev — if a
      # prod lock is held when this dispatch runs, FAIL FAST with
      # clear recovery instructions. Operator must verify no active
      # deploy exists and run the manual `recover-lock.yml` workflow
      # to clear the lock before retrying.
      #
      # Rationale: an unconditional unlock could yank a live lock from
      # an operator's local `sst deploy --stage prod` (rare, but
      # possible). For prod the "safe but slow" cost of explicit
      # operator action is preferable to the "fast but corrupting" cost
      # of auto-recovery getting it wrong.
      - name: Fail fast if prod lock is held
        env:
          STATE_BUCKET: sst-state-vbnmvbvmbzkk
          LOCK_KEY: lock/prontiq/prod.json
        run: |
          set -euo pipefail
          if aws s3api head-object \
            --bucket "$STATE_BUCKET" \
            --key "$LOCK_KEY" \
            --region ap-southeast-2 >/dev/null 2>&1
          then
            LOCK_JSON=$(aws s3 cp "s3://$STATE_BUCKET/$LOCK_KEY" - --region ap-southeast-2)
            echo "::error::Prod SST lock is held. Lock metadata: $LOCK_JSON"
            echo "::error::To recover: confirm no active prod deploy is running, then run the 'Recover stale SST lock' workflow with stage=prod."
            exit 1
          fi
          echo "No prod lock held — safe to deploy."

      - name: Workaround SST/Pulumi version conflict (sst#6314)
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      - name: Deploy to prod
        shell: bash
        env:
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_SKIP_CREDENTIALS_VALIDATION: "true"
          CLERK_ADMIN_ROLES: ${{ vars.CLERK_ADMIN_ROLES }}
          CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
          CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          PRONTIQ_ACCOUNT_URL: ${{ vars.PRONTIQ_ACCOUNT_URL }}
          PRONTIQ_DOCS_URL: ${{ vars.PRONTIQ_DOCS_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          WELCOME_EMAIL_FROM: ${{ vars.WELCOME_EMAIL_FROM }}
        run: |
          set -x
          timeout --signal=SIGTERM --kill-after=30s 10m pnpm deploy:prod || EXIT=$?
          echo "deploy exited with code: ${EXIT:-0}"
          exit "${EXIT:-0}"

  # Post-deploy verification — same intent as the dev smoke job in
  # ci.yml. Mints a real Clerk JWT via the Backend API and exercises
  # the deployed POST /v1/account/setup end-to-end. Catches
  # regressions that unit / integration tests can't.
  #
  # Required GitHub Environment config (Settings → Environments → prod):
  #   - secrets.CLERK_SECRET_KEY  — already configured for the deploy
  #   - vars.CLERK_TEST_USER_ID   — Clerk user_id (operator-created
  #                                 prod test user; see runbook)
  #   - vars.CLERK_TEST_ORG_ID    — optional but recommended
  #
  # Failure semantics: if smoke fails after a successful prod deploy,
  # this job goes red and notifies the operator. The deploy already
  # happened — operator decides whether to roll back via revert PR or
  # investigate. This is post-deploy verification, not a deploy gate.
  #
  # **Caveat for prod:** the smoke needs an active Clerk session for
  # the test user. Clerk's createSession Backend API is dev-only on
  # most plans, so the prod tenant needs an existing session. Either:
  #   (a) operator pre-establishes via Clerk Dashboard "Impersonate
  #       user" before merging the prod-impacting change, OR
  #   (b) accept that the smoke fails with exit code 2 ("couldn't
  #       run") on first prod deploy, and use it as the prompt to
  #       impersonate.
  # The script's error message points operators at the right fix.
  smoke-account-setup-prod:
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Smoke POST /v1/account/setup against deployed prod
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_TEST_USER_ID: ${{ vars.CLERK_TEST_USER_ID }}
          CLERK_TEST_ORG_ID: ${{ vars.CLERK_TEST_ORG_ID }}
          PRONTIQ_API: https://api.prontiq.dev
        run: pnpm --filter @prontiq/api smoke:account-setup:prod
