name: Recover stale SST lock

# Manual operator action to clear an SST state-bucket lock that's been
# left behind by a killed/crashed deploy. Use when:
#   - dev: the auto-recovery in ci.yml refuses to clear because the
#     lock is younger than its 11-minute threshold AND you've verified
#     no real deploy is running anywhere (CI, local, automation).
#   - prod: the deploy-prod.yml fail-fast check refused to deploy
#     because a lock is present AND you've verified no real deploy
#     is running anywhere.
#
# The required `confirm_no_active_deploy` input is the safety bar:
# operators must explicitly type the literal string before this will
# run. Prevents accidental dispatches.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to unlock"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm_no_active_deploy:
        description: 'Type "i-confirm-no-active-deploy" to proceed'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    # Lock recovery for prod requires the production environment so
    # protected-environment reviewers (if configured) gate the action.
    environment: ${{ inputs.stage == 'prod' && 'production' || 'dev' }}
    # Serialize against the corresponding deploy job so we can't try
    # to unlock while a real deploy is running in the same group.
    concurrency:
      group: sst-deploy-${{ inputs.stage }}
      cancel-in-progress: false
    steps:
      - name: Validate confirmation input
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm_no_active_deploy }}" != "i-confirm-no-active-deploy" ]; then
            echo "::error::Confirmation input did not match required string."
            echo "::error::Type exactly: i-confirm-no-active-deploy"
            exit 1
          fi
          echo "Confirmation accepted."

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      - name: Show current lock state before unlocking
        env:
          STATE_BUCKET: sst-state-vbnmvbvmbzkk
          LOCK_KEY: lock/prontiq/${{ inputs.stage }}.json
        run: |
          set -euo pipefail
          if aws s3api head-object \
            --bucket "$STATE_BUCKET" \
            --key "$LOCK_KEY" \
            --region ap-southeast-2 >/dev/null 2>&1
          then
            LOCK_JSON=$(aws s3 cp "s3://$STATE_BUCKET/$LOCK_KEY" - --region ap-southeast-2)
            echo "Current lock for stage=${{ inputs.stage }}: $LOCK_JSON"
          else
            echo "::warning::No lock currently held for stage=${{ inputs.stage }}. Unlock will be a no-op."
          fi

      - name: Unlock
        run: pnpm exec sst unlock --stage ${{ inputs.stage }}

      - name: Verify lock is gone
        env:
          STATE_BUCKET: sst-state-vbnmvbvmbzkk
          LOCK_KEY: lock/prontiq/${{ inputs.stage }}.json
        run: |
          set -euo pipefail
          if aws s3api head-object \
            --bucket "$STATE_BUCKET" \
            --key "$LOCK_KEY" \
            --region ap-southeast-2 >/dev/null 2>&1
          then
            echo "::error::Lock still present after unlock — investigate manually."
            exit 1
          fi
          echo "Lock cleared successfully."
