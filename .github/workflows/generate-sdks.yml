      #   with:
      #     speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
      #     openapi_doc_location: packages/api/openapi.json
      #     languages: |-
      #       - typescript
      #       - python

      - run: echo "SDK generation not yet configured — see P1D.04"
