name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify OpenAPI spec is up to date
        run: |
          node -e "import app from './packages/api/dist/index.js'; const r = await app.fetch(new Request('http://localhost/openapi.json')); const fs = await import('fs'); fs.writeFileSync('packages/docs/openapi.json', JSON.stringify(await r.json(), null, 4) + '\n');"
          if ! git diff --exit-code packages/docs/openapi.json; then
            echo "::error::packages/docs/openapi.json is stale. Run 'pnpm generate:openapi' and commit."
            exit 1
          fi

      - run: pnpm test

  integration-test:
    needs: check
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.19.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NotSecure_Integration_Test_Password_123!"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Wait for OpenSearch
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9200/_cluster/health; then
              echo "OpenSearch ready"
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch never became ready"
          exit 1
      - name: Run integration tests
        env:
          OPENSEARCH_TEST_URL: http://localhost:9200
        # The script builds workspace dependencies via `pnpm -w build --filter`
        # (Turbo handles topological ordering for project references).
        run: pnpm --filter @prontiq/api test:integration

  deploy-dev:
    needs: [check, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # Deploy first — creates ECR repo and all other infrastructure.
      #
      # Wrapped in `script -qec` to allocate a pseudo-TTY: without this, Node
      # (which SST/Pulumi runs on) detects the non-TTY stdout and switches to
      # BLOCK BUFFERING, which hides all `|  Refreshed X` / `|  Created Y`
      # progress lines until the process exits. From CI's side that looks
      # identical to a hang — we had 15-min silent grinds during the PR #50
      # rollout where the deploy was actually working fine. `script` forces
      # line-buffered output by allocating a pty, so progress streams in real
      # time and an operator can tell at a glance whether a run is progressing
      # or genuinely stuck.
      - name: Deploy to dev (line-buffered for live progress)
        run: script -qefc "pnpm deploy:dev" /dev/null

      # Build and push Fargate image AFTER deploy so ECR repo exists
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Fargate bulk ingest image
        run: |
          ECR_REPO=$(aws ecr describe-repositories --repository-names prontiq-ingest-bulk-dev --query 'repositories[0].repositoryUri' --output text)
          docker build --platform linux/amd64 -t "$ECR_REPO:${{ github.sha }}" -t "$ECR_REPO:latest" -f packages/ingestion/Dockerfile .
          docker push "$ECR_REPO:${{ github.sha }}"
          docker push "$ECR_REPO:latest"
