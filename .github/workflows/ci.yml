name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify OpenAPI spec is up to date
        run: |
          node -e "import app from './packages/api/dist/index.js'; const r = await app.fetch(new Request('http://localhost/openapi.json')); const fs = await import('fs'); fs.writeFileSync('packages/docs/openapi.json', JSON.stringify(await r.json(), null, 4) + '\n');"
          if ! git diff --exit-code packages/docs/openapi.json; then
            echo "::error::packages/docs/openapi.json is stale. Run 'pnpm generate:openapi' and commit."
            exit 1
          fi

      - run: pnpm test

  integration-test:
    needs: check
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.19.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NotSecure_Integration_Test_Password_123!"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Wait for OpenSearch
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9200/_cluster/health; then
              echo "OpenSearch ready"
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch never became ready"
          exit 1
      - name: Run integration tests
        env:
          OPENSEARCH_TEST_URL: http://localhost:9200
        # The script builds workspace dependencies via `pnpm -w build --filter`
        # (Turbo handles topological ordering for project references).
        run: pnpm --filter @prontiq/api test:integration

  deploy-dev:
    needs: [check, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # Clear any stale SST state lock from a prior failed CI run.
      #
      # Discovered after PR #63 surfaced .sst/log/sst.log content:
      # if a previous CI deploy was killed (timeout, manual cancel,
      # runner crash) before SST could release its state-bucket lock,
      # the next run hits "Concurrent update detected" and fails in
      # 11 seconds. We were stuck in a vicious cycle: each timeout-
      # killed run blocked the next.
      #
      # `sst unlock` is idempotent and safe — exits 0 whether or not
      # a lock exists. `|| true` belt-and-braces if the binary itself
      # errors for some reason; we still want the deploy to proceed.
      #
      # Local equivalent: `pnpm exec sst unlock --stage dev` before
      # any retry after a failed deploy.
      - name: Clear stale SST lock from prior CI run
        run: pnpm exec sst unlock --stage dev || true

      # GitHub's `ubuntu-latest` image has Pulumi pre-installed at
      # /usr/local/bin/pulumi-language-nodejs. As of Pulumi v3.214.0
      # (Jan 2026), that binary's `-root` flag was removed:
      #   https://github.com/pulumi/pulumi/pull/21065
      # SST (all 3.x and 4.x versions we tested) still passes `-root`.
      # When SST's child-process invocation finds the system binary
      # first on PATH, it silently hangs immediately after AWS provider
      # init — matches our exact symptom (no output after
      # "Retrieved caller identity from STS", killed by timeout).
      # Upstream SST issue (still open as of this PR):
      #   https://github.com/sst/sst/issues/6314
      # Removing the system binary forces SST to use its OWN bundled
      # Pulumi (downloaded to ~/.config/sst/bin/ on Linux), which is
      # a compatible version.
      - name: Workaround SST/Pulumi version conflict (sst#6314)
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      # Deploy first — creates ECR repo and all other infrastructure.
      #
      # Retained from earlier diagnostic iterations:
      #   AWS_EC2_METADATA_DISABLED=true
      #     Bypasses IMDS credential lookup (169.254.169.254 link-local
      #     is unreachable on GH runners). No cost when env creds exist.
      #   AWS_SKIP_CREDENTIALS_VALIDATION=true
      #     Skips the AWS provider's startup STS validation. No cost —
      #     actual role auth is verified at configure-aws-credentials
      #     above.
      #   timeout 10m wrapper
      #     Belt-and-braces — if the Pulumi fix above is wrong, force
      #     exit instead of running the runner for hours.
      - name: Deploy to dev
        shell: bash
        env:
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_SKIP_CREDENTIALS_VALIDATION: "true"
          # Some SST hangs trace back to $USER being unset (see sst#5539).
          # GH runners set USER but defensively pin it.
          USER: "runner"
        run: |
          set -x
          timeout --signal=SIGTERM --kill-after=30s 10m pnpm deploy:dev || EXIT=$?
          echo "deploy exited with code: ${EXIT:-0}"
          exit "${EXIT:-0}"

      # On any deploy outcome (success OR failure), surface the hidden
      # SST/Pulumi log file. This is the canonical "what actually went wrong"
      # data; SST writes it to .sst/log/pulumi.log but never echoes it to
      # stdout in CI mode. Multiple SST issues recommend grabbing this when
      # debugging (see sst#5539, sst#6314 thread).
      - name: Dump SST/Pulumi log on completion
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "  .sst/log/pulumi.log (last 500 lines)"
          echo "=========================================="
          if [ -f .sst/log/pulumi.log ]; then
            tail -n 500 .sst/log/pulumi.log
          else
            echo "(file does not exist — check if .sst/log/ has anything)"
            ls -la .sst/log/ 2>&1 || echo "(.sst/log/ also missing)"
            ls -la .sst/ 2>&1 || echo "(.sst/ also missing)"
          fi
          echo "=========================================="

      - name: Upload SST log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sst-log-deploy-dev
          path: .sst/log/
          if-no-files-found: warn
          retention-days: 7

      # Build and push Fargate image AFTER deploy so ECR repo exists
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Fargate bulk ingest image
        run: |
          ECR_REPO=$(aws ecr describe-repositories --repository-names prontiq-ingest-bulk-dev --query 'repositories[0].repositoryUri' --output text)
          docker build --platform linux/amd64 -t "$ECR_REPO:${{ github.sha }}" -t "$ECR_REPO:latest" -f packages/ingestion/Dockerfile .
          docker push "$ECR_REPO:${{ github.sha }}"
          docker push "$ECR_REPO:latest"
