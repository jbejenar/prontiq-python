name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify OpenAPI spec is up to date
        run: |
          node -e "import app from './packages/api/dist/index.js'; const r = await app.fetch(new Request('http://localhost/openapi.json')); const fs = await import('fs'); fs.writeFileSync('packages/docs/openapi.json', JSON.stringify(await r.json(), null, 4) + '\n');"
          if ! git diff --exit-code packages/docs/openapi.json; then
            echo "::error::packages/docs/openapi.json is stale. Run 'pnpm generate:openapi' and commit."
            exit 1
          fi

      - run: pnpm test

  integration-test:
    needs: check
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.19.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NotSecure_Integration_Test_Password_123!"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Wait for OpenSearch
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9200/_cluster/health; then
              echo "OpenSearch ready"
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch never became ready"
          exit 1
      - name: Run integration tests
        env:
          OPENSEARCH_TEST_URL: http://localhost:9200
        # The script builds workspace dependencies via `pnpm -w build --filter`
        # (Turbo handles topological ordering for project references).
        run: pnpm --filter @prontiq/api test:integration

  deploy-dev:
    needs: [check, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # Deploy first — creates ECR repo and all other infrastructure.
      #
      # TEMPORARY DEBUG MODE v3. v2 (PR #56) showed Pulumi gets as far as
      # "pulumi-aws: credentials are valid" + "Retrieved caller identity
      # from STS" and then goes silent. `PULUMI_LOG_VERBOSE=9` that I set
      # was not a real Pulumi env var — typo'd for `PULUMI_DEBUG_GRPC`.
      # Also AWS credential validation might be the hang (the log even
      # hints at AWS_SKIP_CREDENTIALS_VALIDATION as a bypass).
      #
      # v3 changes vs v2:
      #   AWS_SKIP_CREDENTIALS_VALIDATION=true
      #     Explicitly skips the AWS provider's STS validation call at
      #     startup. If the hang happens elsewhere, this still deploys;
      #     if it happens during validation, we get past it and see the
      #     next phase in logs. Safe because the actual role auth is
      #     already verified by configure-aws-credentials@v4 higher up.
      #
      #   PULUMI_DEBUG_GRPC=true
      #     THIS is the real env var (v2 had PULUMI_LOG_VERBOSE=9 which
      #     doesn't exist). Dumps gRPC traffic between the Pulumi engine
      #     and the provider subprocesses. We need this to see what's
      #     happening after "Retrieved caller identity from STS" —
      #     specifically which gRPC request/response pair is pending.
      #
      #   timeout 600 wrapper
      #     Force-kill the deploy after 10 min instead of waiting for us
      #     to manually cancel. Node may dump a final state on SIGTERM
      #     that we haven't seen yet. Exit code 124 = timeout fired.
      #
      # Kept from v2: TF_LOG=DEBUG, SST_VERBOSE, PULUMI_DEBUG_COMMANDS.
      # Removed: PULUMI_LOG_VERBOSE (not a real env var).
      #
      # Still diagnostic-only.
      - name: Deploy to dev (DEBUG MODE v3 — GRPC + skip-AWS-validation + timeout)
        shell: bash
        env:
          TF_LOG: "DEBUG"
          PULUMI_DEBUG_GRPC: "true"
          AWS_SKIP_CREDENTIALS_VALIDATION: "true"
          SST_VERBOSE: "1"
          PULUMI_DEBUG_COMMANDS: "true"
        run: |
          set -x
          # 10-min cap — beyond the 3-15 min "normal silent-refresh" band.
          # If the hang persists, SIGTERM triggers Node's default exit path
          # which may print state we haven't seen. Exit 124 = timeout fired.
          timeout --signal=SIGTERM --kill-after=30s 10m pnpm deploy:dev || EXIT=$?
          echo "deploy exited with code: ${EXIT:-0}"
          exit "${EXIT:-0}"

      # Build and push Fargate image AFTER deploy so ECR repo exists
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Fargate bulk ingest image
        run: |
          ECR_REPO=$(aws ecr describe-repositories --repository-names prontiq-ingest-bulk-dev --query 'repositories[0].repositoryUri' --output text)
          docker build --platform linux/amd64 -t "$ECR_REPO:${{ github.sha }}" -t "$ECR_REPO:latest" -f packages/ingestion/Dockerfile .
          docker push "$ECR_REPO:${{ github.sha }}"
          docker push "$ECR_REPO:latest"
