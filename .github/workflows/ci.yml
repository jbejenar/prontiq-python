name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify OpenAPI spec is up to date
        run: |
          node -e "import app from './packages/api/dist/index.js'; const r = await app.fetch(new Request('http://localhost/openapi.json')); const fs = await import('fs'); fs.writeFileSync('packages/docs/openapi.json', JSON.stringify(await r.json(), null, 4) + '\n');"
          if ! git diff --exit-code packages/docs/openapi.json; then
            echo "::error::packages/docs/openapi.json is stale. Run 'pnpm generate:openapi' and commit."
            exit 1
          fi

      - run: pnpm test

  integration-test:
    needs: check
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.19.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NotSecure_Integration_Test_Password_123!"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Wait for OpenSearch
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9200/_cluster/health; then
              echo "OpenSearch ready"
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch never became ready"
          exit 1
      - name: Run integration tests
        env:
          OPENSEARCH_TEST_URL: http://localhost:9200
        # The script builds workspace dependencies via `pnpm -w build --filter`
        # (Turbo handles topological ordering for project references).
        run: pnpm --filter @prontiq/api test:integration

  deploy-dev:
    needs: [check, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # Deploy first — creates ECR repo and all other infrastructure.
      #
      # TEMPORARY DEBUG MODE v2. PR #55's first debug attempt used
      # `NODE_DEBUG=net,tls,http,https`, which only logged the NODE HOST's
      # own traffic (mostly localhost RPC to the Pulumi engine at
      # 127.0.0.1:13557). The actual AWS SDK calls happen inside the
      # `pulumi-resource-aws` SUBPROCESS (Go, not Node), so Node's debug
      # never sees them. Can't diagnose the hang without provider-level
      # visibility.
      #
      # v2 debug env:
      #   TF_LOG=DEBUG                pulumi-resource-aws wraps
      #                               terraform-provider-aws under the hood.
      #                               TF_LOG=DEBUG enables provider-level
      #                               logging of every AWS SDK request:
      #                               endpoint, headers, response timing.
      #                               This is the one that tells us if a
      #                               specific AWS call is stuck.
      #   PULUMI_LOG_VERBOSE=9        Pulumi engine's own max verbosity.
      #                               Logs gRPC between engine, language
      #                               host, and providers.
      #   SST_VERBOSE=1               SST-level resource operation detail.
      #   PULUMI_DEBUG_COMMANDS=true  Pulumi logs sub-command spawns.
      #
      # NODE_DEBUG dropped — redundant vs the above, and was too noisy
      # with low signal.
      #
      # Still a diagnostic-only block — revert once the root cause of
      # the CI hang is found. TF_LOG=DEBUG may leak signed AWS request
      # details into logs; tolerable during diagnosis, not long-term.
      - name: Deploy to dev (DEBUG MODE v2 — TF_LOG + PULUMI_LOG)
        shell: bash
        env:
          TF_LOG: "DEBUG"
          PULUMI_LOG_VERBOSE: "9"
          SST_VERBOSE: "1"
          PULUMI_DEBUG_COMMANDS: "true"
        run: |
          set -x
          pnpm deploy:dev

      # Build and push Fargate image AFTER deploy so ECR repo exists
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Fargate bulk ingest image
        run: |
          ECR_REPO=$(aws ecr describe-repositories --repository-names prontiq-ingest-bulk-dev --query 'repositories[0].repositoryUri' --output text)
          docker build --platform linux/amd64 -t "$ECR_REPO:${{ github.sha }}" -t "$ECR_REPO:latest" -f packages/ingestion/Dockerfile .
          docker push "$ECR_REPO:${{ github.sha }}"
          docker push "$ECR_REPO:latest"
