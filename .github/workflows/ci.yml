name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify OpenAPI spec is up to date
        run: |
          node -e "import app from './packages/api/dist/index.js'; const r = await app.fetch(new Request('http://localhost/openapi.json')); const fs = await import('fs'); fs.writeFileSync('packages/docs/openapi.json', JSON.stringify(await r.json(), null, 4) + '\n');"
          if ! git diff --exit-code packages/docs/openapi.json; then
            echo "::error::packages/docs/openapi.json is stale. Run 'pnpm generate:openapi' and commit."
            exit 1
          fi

      - run: pnpm test

  integration-test:
    needs: check
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.19.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NotSecure_Integration_Test_Password_123!"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Wait for OpenSearch
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9200/_cluster/health; then
              echo "OpenSearch ready"
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch never became ready"
          exit 1
      - name: Run integration tests
        env:
          OPENSEARCH_TEST_URL: http://localhost:9200
        # The script builds workspace dependencies via `pnpm -w build --filter`
        # (Turbo handles topological ordering for project references).
        run: pnpm --filter @prontiq/api test:integration

  deploy-dev:
    needs: [check, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493712557159:role/prontiq-platform-deploy-role
          aws-region: ap-southeast-2

      # Deploy first — creates ECR repo and all other infrastructure.
      #
      # CI hang diagnosis working hypothesis (after 3 rounds of debug
      # env iteration — PRs #55/56/58):
      #
      #   GitHub Actions runners are NOT EC2 instances, but AWS SDKs
      #   (Go, JS, Python) all have IMDS — the EC2 Instance Metadata
      #   Service at 169.254.169.254 — in their default credential
      #   resolver chain. Even with env-var creds populated by
      #   configure-aws-credentials@v4, some providers still probe IMDS
      #   at startup. The connection attempt to 169.254.169.254 has a
      #   default timeout of several minutes (varies by SDK version),
      #   and the probe is silent in non-TTY mode, explaining our
      #   invisible stall right after "Retrieved caller identity from
      #   STS".
      #
      #   `AWS_EC2_METADATA_DISABLED=true` is the standard env var that
      #   all AWS SDKs honor to bypass IMDS entirely. Safe because we
      #   already have env-var creds from OIDC, so IMDS fallback isn't
      #   needed.
      #
      # Kept: AWS_SKIP_CREDENTIALS_VALIDATION (no cost, closes a
      # separate potential hang source). `timeout 10m` wrapper (belt
      # and braces — if IMDS isn't the cause, we still exit cleanly
      # instead of running the runner for hours).
      #
      # Dropped: all the *_DEBUG / *_VERBOSE env vars from v3. Debug
      # output was useful for diagnosis but noisy in normal operation.
      # Add back selectively if this fix turns out to be wrong.
      - name: Deploy to dev
        shell: bash
        env:
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_SKIP_CREDENTIALS_VALIDATION: "true"
        run: |
          set -x
          timeout --signal=SIGTERM --kill-after=30s 10m pnpm deploy:dev || EXIT=$?
          echo "deploy exited with code: ${EXIT:-0}"
          exit "${EXIT:-0}"

      # Build and push Fargate image AFTER deploy so ECR repo exists
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Fargate bulk ingest image
        run: |
          ECR_REPO=$(aws ecr describe-repositories --repository-names prontiq-ingest-bulk-dev --query 'repositories[0].repositoryUri' --output text)
          docker build --platform linux/amd64 -t "$ECR_REPO:${{ github.sha }}" -t "$ECR_REPO:latest" -f packages/ingestion/Dockerfile .
          docker push "$ECR_REPO:${{ github.sha }}"
          docker push "$ECR_REPO:latest"
